name: Deploy Vite app to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_HELIUS_API_KEY: ${{ secrets.VITE_HELIUS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sol_dex_viewer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: sol_dex_viewer

      - name: Build
        run: npm run build
        working-directory: sol_dex_viewer

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: sol_dex_viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
